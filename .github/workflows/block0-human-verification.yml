name: Block 0 Human Verification

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify README setup and first 8 endpoints
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      ORG_ID: 11111111-1111-4111-8111-111111111111
      OWNER_ID: 22222222-2222-4222-8222-222222222222
      REVIEWER_ID: 33333333-3333-4333-8333-333333333333
      OWNER_TOKEN: owner-actions-token
      REVIEWER_TOKEN: reviewer-actions-token
      ASTRYNN_DATABASE_URL: sqlite:///./verification.db
      ASTRYNN_AUTO_CREATE_SCHEMA: "true"
      ASTRYNN_API_TOKENS_JSON: >-
        [{"token":"owner-actions-token","actor_id":"22222222-2222-4222-8222-222222222222","organization_id":"11111111-1111-4111-8111-111111111111","role":"CASE_OWNER","display_name":"Actions Owner"},{"token":"reviewer-actions-token","actor_id":"33333333-3333-4333-8333-333333333333","organization_id":"11111111-1111-4111-8111-111111111111","role":"REVIEWER","display_name":"Actions Reviewer"}]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare evidence directory
        run: mkdir -p verification-artifacts

      - name: Record clean environment
        id: environment
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            echo "UTC timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            python --version
            pip --version
            git rev-parse HEAD
            git status --short
          } 2>&1 | tee verification-artifacts/environment.txt

      - name: Install project using README commands
        id: install
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m pip install --upgrade pip 2>&1 | tee verification-artifacts/install.txt
          pip install -e . ruff pytest 2>&1 | tee -a verification-artifacts/install.txt

      - name: Run Ruff
        id: ruff
        if: steps.install.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          ruff check . 2>&1 | tee verification-artifacts/ruff.txt

      - name: Run pytest
        id: pytest
        if: steps.install.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pytest -q 2>&1 | tee verification-artifacts/pytest.txt

      - name: Start private API
        id: api
        if: steps.install.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          rm -f verification.db
          nohup uvicorn astrynn_devforge.api:app \
            --host 127.0.0.1 \
            --port 8000 \
            > verification-artifacts/uvicorn.log 2>&1 &
          echo $! > verification-artifacts/uvicorn.pid

          python - <<'PY'
          import time
          import httpx

          last_error = None
          for _ in range(40):
              try:
                  response = httpx.get("http://127.0.0.1:8000/health", timeout=2.0)
                  if response.status_code == 200:
                      print("API became ready")
                      raise SystemExit(0)
                  last_error = f"HTTP {response.status_code}: {response.text}"
              except Exception as exc:
                  last_error = repr(exc)
              time.sleep(0.5)

          print(f"API did not become ready: {last_error}")
          raise SystemExit(1)
          PY

      - name: Verify first 8 endpoints
        id: endpoints
        if: steps.api.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python .github/scripts/block0_verify.py \
            --base-url http://127.0.0.1:8000 \
            --output-dir verification-artifacts \
            2>&1 | tee verification-artifacts/endpoint-console.txt

      - name: Stop private API
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          if [[ -f verification-artifacts/uvicorn.pid ]]; then
            kill "$(cat verification-artifacts/uvicorn.pid)" || true
          fi

      - name: Build verification summary
        if: always()
        shell: bash
        env:
          ENVIRONMENT_OUTCOME: ${{ steps.environment.outcome }}
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          RUFF_OUTCOME: ${{ steps.ruff.outcome }}
          PYTEST_OUTCOME: ${{ steps.pytest.outcome }}
          API_OUTCOME: ${{ steps.api.outcome }}
          ENDPOINTS_OUTCOME: ${{ steps.endpoints.outcome }}
        run: |
          {
            echo "# Block 0 Human Verification"
            echo
            echo "| Stage | GitHub Actions outcome |"
            echo "|---|---|"
            echo "| Clean environment | $ENVIRONMENT_OUTCOME |"
            echo "| README dependency installation | $INSTALL_OUTCOME |"
            echo "| Ruff | $RUFF_OUTCOME |"
            echo "| pytest | $PYTEST_OUTCOME |"
            echo "| API startup | $API_OUTCOME |"
            echo "| First 8 endpoints | $ENDPOINTS_OUTCOME |"
            echo
            echo "The downloadable artifact contains raw logs, JSON responses and the Markdown endpoint report."
          } | tee verification-artifacts/actions-summary.md

          cat verification-artifacts/actions-summary.md >> "$GITHUB_STEP_SUMMARY"
          if [[ -f verification-artifacts/block0-endpoint-results.md ]]; then
            echo >> "$GITHUB_STEP_SUMMARY"
            cat verification-artifacts/block0-endpoint-results.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: block0-human-verification-${{ github.run_number }}
          path: verification-artifacts/
          if-no-files-found: error
          retention-days: 30

      - name: Enforce verification result
        if: always()
        shell: bash
        env:
          ENVIRONMENT_OUTCOME: ${{ steps.environment.outcome }}
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          RUFF_OUTCOME: ${{ steps.ruff.outcome }}
          PYTEST_OUTCOME: ${{ steps.pytest.outcome }}
          API_OUTCOME: ${{ steps.api.outcome }}
          ENDPOINTS_OUTCOME: ${{ steps.endpoints.outcome }}
        run: |
          failures=0
          for outcome in \
            "$ENVIRONMENT_OUTCOME" \
            "$INSTALL_OUTCOME" \
            "$RUFF_OUTCOME" \
            "$PYTEST_OUTCOME" \
            "$API_OUTCOME" \
            "$ENDPOINTS_OUTCOME"; do
            if [[ "$outcome" != "success" ]]; then
              failures=$((failures + 1))
            fi
          done

          if [[ "$failures" -gt 0 ]]; then
            echo "$failures verification stage(s) did not complete successfully."
            exit 1
          fi

          echo "All verification stages completed successfully."
